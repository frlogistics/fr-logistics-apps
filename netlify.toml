[functions]
  directory = "netlify/functions"

[functions."daily-summary"]
  schedule = "0 23 * * *"

[functions."inventory-alert"]
  schedule = "0 21 * * *"

[functions."refresh-ig-token"]
  schedule = "0 12 1 */45 *"
[functions."dropship-gmail-sync"]
  schedule = "0 */2 * * *"

[functions."dropship-orphan-alert"]
  schedule = "15 */2 * * *"
  [functions."dropship-manifest"]
  schedule = "0 23 * * *"
  
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[redirects]]
  from = "/"
  to = "/portal.html"
  status = 302

[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 302 
