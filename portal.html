<!doctype html> <html lang="en"> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1" /> <title>FR-Logistics · Apps Portal</title> <link rel="preconnect" href="https://fonts.googleapis.com"> <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"> <style> :root { --bg: #0a0f0d; --surface: #111814; --card: #151f1a; --border: rgba(31,164,99,.18); --green: #1fa463; --teal: #16a3b5; --text: #e8f0eb; --muted: #6b8a74; --accent: #24c97a; --shadow: 0 24px 64px rgba(0,0,0,.55); } *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; } body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 900px 600px at 10% 20%, rgba(31,164,99,.10) 0%, transparent 65%), radial-gradient(ellipse 700px 500px at 90% 80%, rgba(22,163,181,.08) 0%, transparent 65%); pointer-events: none; } #loginScreen { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: var(--bg); transition: opacity .5s, visibility .5s; } #loginScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; } .loginBox { width: min(400px, 92vw); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; box-shadow: var(--shadow); position: relative; overflow: hidden; } .loginBox::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), var(--teal)); } .loginLogo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; } .loginLogo img { height: 36px; border-radius: 8px; } .loginLogo span { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: .3px; } .loginTitle { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .loginSub { color: var(--muted); font-size: 13px; margin-bottom: 28px; } .loginField label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; } .loginField input { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(31,164,99,.25); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'DM Mono', monospace; outline: none; letter-spacing: 2px; transition: border-color .2s, box-shadow .2s; } .loginField input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(31,164,99,.15); } .loginBtn { width: 100%; margin-top: 20px; background: linear-gradient(135deg, var(--green), var(--teal)); border: none; border-radius: 10px; padding: 13px; color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: .3px; transition: opacity .2s, transform .1s; } .loginBtn:hover { opacity: .9; } .loginBtn:active { transform: scale(.98); } .loginError { margin-top: 12px; font-size: 12px; color: #f87171; text-align: center; min-height: 18px; letter-spacing: .2px; } #portalScreen { position: relative; z-index: 1; opacity: 0; transition: opacity .6s; } #portalScreen.visible { opacity: 1; } header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: rgba(10,15,13,.85); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10; } .headerRow { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; } .brand { display: flex; align-items: center; gap: 12px; } .brand img { height: 32px; border-radius: 8px; } .brand h1 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: .2px; } .brand .sub { font-size: 11px; color: var(--muted); margin-top: 2px; } .headerRight { display: flex; align-items: center; gap: 12px; } .pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(31,164,99,.35); color: var(--accent); letter-spacing: .3px; } .logoutBtn { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.10); border-radius: 8px; padding: 7px 14px; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: background .2s, color .2s; } .logoutBtn:hover { background: rgba(255,255,255,.08); color: var(--text); } main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 60px; } .sectionTitle { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 20px; } .appGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; } .appCard { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s, box-shadow .2s; position: relative; } .appCard:hover { transform: translateY(-3px); border-color: rgba(31,164,99,.45); box-shadow: 0 16px 48px rgba(0,0,0,.4), 0 0 0 1px rgba(31,164,99,.15); } .appCard:active { transform: translateY(-1px); } .previewFrame { width: 100%; height: 180px; background: #0e1510; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); } .previewFrame iframe { width: 200%; height: 200%; transform: scale(.5); transform-origin: top left; border: none; pointer-events: none; filter: brightness(.9); } .previewOverlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--card) 100%); } .previewClick { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; background: rgba(10,15,13,.65); } .appCard:hover .previewClick { opacity: 1; } .previewClick span { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .5px; border: 1px solid var(--accent); padding: 8px 18px; border-radius: 8px; background: rgba(36,201,122,.08); } .appInfo { padding: 14px 16px 16px; } .appName { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); } .appDesc { font-size: 12px; color: var(--muted); line-height: 1.5; } .appTag { display: inline-block; margin-top: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 3px 8px; border-radius: 999px; background: rgba(31,164,99,.10); border: 1px solid rgba(31,164,99,.25); color: var(--accent); } .appTag.analytics { background: rgba(22,163,181,.10); border-color: rgba(22,163,181,.30); color: var(--teal); } #appOverlay { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s; } #appOverlay.open { opacity: 1; visibility: visible; } .overlayBar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; } .closeBtn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 7px 14px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .2s; } .closeBtn:hover { background: rgba(255,255,255,.10); } .overlayTitle { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; flex: 1; } .overlayUrl { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); } #appFrame { flex: 1; border: none; width: 100%; } footer { border-top: 1px solid var(--border); padding: 20px 24px; background: rgba(10,15,13,.7); } .footRow { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); } .appCard { animation: fadeUp .5s ease both; } .appCard:nth-child(1) { animation-delay: .05s; } .appCard:nth-child(2) { animation-delay: .10s; } .appCard:nth-child(3) { animation-delay: .15s; } .appCard:nth-child(4) { animation-delay: .20s; } .appCard:nth-child(5) { animation-delay: .25s; } .appCard:nth-child(6) { animation-delay: .30s; } .appCard:nth-child(7) { animation-delay: .35s; } .appCard:nth-child(8) { animation-delay: .40s; } .appCard:nth-child(9) { animation-delay: .45s; } @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } } @media (max-width: 600px) { .appGrid { grid-template-columns: 1fr; } .overlayUrl { display: none; } } </style> </head> <body>
<div id="loginScreen"> <div class="loginBox"> <div class="loginLogo"> <img src="fr_logo.png" alt="FR" onerror="this.style.display='none'"> <span>FR-Logistics</span> </div> <div class="loginTitle">Apps Portal</div> <div class="loginSub">Enter your password to access the operations dashboard</div> <div class="loginField"> <label>Password</label> <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password" /> </div> <button class="loginBtn" id="loginBtn">Access Portal →</button> <div class="loginError" id="loginError"></div> </div> </div>
<div id="portalScreen"> <header> <div class="headerRow"> <div class="brand"> <img src="fr_logo.png" alt="FR" onerror="this.style.display='none'"> <div> <h1>FR-Logistics · Operations</h1> <div class="sub">apps.fr-logistics.net</div> </div> </div> <div class="headerRight"> <span class="pill">● LIVE</span> <button class="logoutBtn" id="logoutBtn">Sign out</button> </div> </div> </header> <main> <div class="sectionTitle">Operations Apps — click to open</div> <div class="appGrid" id="appGrid"></div> </main> <footer> <div class="footRow"> <span>FR-Logistics · Miami, FL</span> <span>All apps save directly to Supabase cloud</span> </div> </footer> </div>
<div id="appOverlay"> <div class="overlayBar"> <button class="closeBtn" id="closeBtn"> ← Back to Portal </button> <span class="overlayTitle" id="overlayTitle"></span> <span class="overlayUrl" id="overlayUrl"></span> </div> <iframe id="appFrame" allow="camera; microphone"></iframe> </div>
<script>
  const PASSWORD = "frlogistics2024";
  const APPS = [
  { name: "Inventory Dashboard", desc: "Inventario en tiempo real desde SKUVault — 140 SKUs, stock levels, alerts por warehouse WH001 Doral FL", tag: "Warehouse", url: "https://apps.fr-logistics.net/dashboard-inventory.html" },
      { name: "KPI Dashboard", desc: "Dashboard en tiempo real — shipments, revenue, SLA y stores desde ShipStation", tag: "Analytics", url: "https://apps.fr-logistics.net/kpi-dash.html" },
    { name: "FR Inbounds", desc: "Registro de paquetes entrantes — escanear, registrar, guardar", tag: "Inbound", url: "https://apps.fr-logistics.net/fr-inbounds.html" },
    { name: "MXS Overseas LTD", desc: "Shipments y tracking para cliente MXS Overseas", tag: "Client App", url: "https://apps.fr-logistics.net/MXS_Overseas_LTD.html" },
    { name: "LN Store", desc: "Gestión de shipments para LN Store — FBA/FBM", tag: "Client App", url: "https://apps.fr-logistics.net/LN_Store.html" },
    { name: "Inbound / Outbound", desc: "Registro general de entradas y salidas de mercancía", tag: "Operations", url: "https://apps.fr-logistics.net/Inbound_Outbound.html" },
    { name: "Pallets (WMS)", desc: "Pallet builder con WMS ID — escanear, marcar, imprimir QR 4x6", tag: "Warehouse", url: "https://apps.fr-logistics.net/pallets.html" },
    { name: "NO WMS Pallets", desc: "Pallet builder para clientes sin WMS — registro QR y open pallets", tag: "Warehouse", url: "https://apps.fr-logistics.net/NO_WMS.html" },
    { name: "Quote System v3", desc: "Calculadora de cotizaciones para clientes — fulfillment, storage, prep", tag: "Sales", url: "https://apps.fr-logistics.net/FR_Logistics_Quote_System_v3.html" },
    { name: "Volume Calculator", desc: "Calculadora de volumen y dimensiones para carga y tarimas", tag: "Tools", url: "https://apps.fr-logistics.net/FR_Logistics_Volume_Calculator.html" }
  ];
  const SESSION_KEY = "fr_portal_auth";
  function checkSession() { return sessionStorage.getItem(SESSION_KEY) === "true"; }
  function login() {
    const val = document.getElementById("pwInput").value;
    if (val === PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, "true");
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("portalScreen").classList.add("visible");
      renderApps();
    } else {
      const err = document.getElementById("loginError");
      err.textContent = "Incorrect password. Try again.";
      document.getElementById("pwInput").value = "";
      document.getElementById("pwInput").focus();
      setTimeout(() => err.textContent = "", 3000);
    }
  }
  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("portalScreen").classList.remove("visible");
    document.getElementById("pwInput").value = "";
  }
  function renderApps() {
    const grid = document.getElementById("appGrid");
    grid.innerHTML = "";
    APPS.forEach(app => {
      const card = document.createElement("div");
      card.className = "appCard";
      const tagClass = app.tag === "Analytics" ? "appTag analytics" : "appTag";
      card.innerHTML = `
        <div class="previewFrame">
          <iframe src="${app.url}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
          <div class="previewOverlay"></div>
          <div class="previewClick"><span>Open App →</span></div>
        </div>
        <div class="appInfo">
          <div class="appName">${app.name}</div>
          <div class="appDesc">${app.desc}</div>
          <span class="${tagClass}">${app.tag}</span>
        </div>`;
      card.addEventListener("click", () => openApp(app));
      grid.appendChild(card);
    });
  }
  function openApp(app) {
    document.getElementById("overlayTitle").textContent = app.name;
    document.getElementById("overlayUrl").textContent = app.url;
    document.getElementById("appFrame").src = app.url;
    document.getElementById("appOverlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeApp() {
    document.getElementById("appOverlay").classList.remove("open");
    document.getElementById("appFrame").src = "";
    document.body.style.overflow = "";
  }
  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  document.getElementById("logoutBtn").addEventListener("click", logout);
  document.getElementById("closeBtn").addEventListener("click", closeApp);
  if (checkSession()) {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("portalScreen").classList.add("visible");
    renderApps();
  }
</script>
</body> </html>
